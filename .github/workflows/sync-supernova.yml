name: Supernova Auto-Sync Tokens

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'tokens/tokens.json'
      - 'supernova.settings.json'

jobs:
  sync:
    name: Push tokens to Supernova
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supernova CLI
        run: npm install -g @supernovaio/cli

      - name: Sync tokens to Supernova
        run: |
          set -euo pipefail
          set -o pipefail
          supernova --version || true
          LOG="$(mktemp)"
          supernova sync-tokens \
            --apiKey "${{ secrets.SUPERNOVA_API_KEY }}" \
            --designSystemId "771068" \
            --tokenFilePath "./tokens/tokens.json" \
            --configFilePath "./supernova.settings.json" \
            2>&1 | tee "$LOG"
          SYNC_EXIT="${PIPESTATUS[0]}"
          if [ "$SYNC_EXIT" -ne 0 ]; then
            echo "::error::supernova sync-tokens exited with $SYNC_EXIT"
            exit "$SYNC_EXIT"
          fi
          if grep -qiE 'could not find any entity|something went wrong|incorrect plugin theme' "$LOG"; then
            echo "::error::Supernova sync failed — check supernova.settings.json (use tokenSets [\"global\"] for DTCG single-file, not tokensTheme; supernovaBrand = brand name in Supernova)."
            exit 1
          fi
          echo "✅ Tokens synced to Supernova design system 771068"
